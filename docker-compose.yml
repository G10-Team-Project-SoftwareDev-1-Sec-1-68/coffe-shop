version: '3.8'

services:
  postgres_db:
    container_name: postgres_db
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kafung_network  # <-- ระบุให้อยู่ในวงนี้

  pgadmin:
    image: dpage/pgadmin4
    container_name: kafung_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5051:80"
    depends_on:
      - postgres_db
    networks:
      - kafung_network  # <-- ระบุให้อยู่ในวงเดียวกัน

volumes:
  postgres_data:

networks:
  kafung_network:      # <-- ประกาศสร้างวง Network
    driver: bridge
    